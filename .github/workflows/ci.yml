name: Smart Deployment Guard CI

on:
  push:
    branches:
      - main

jobs:
  ci-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Health Check
        run: python scripts/health_check.py

      - name: Run Decision Engine
        run: python scripts/decision_engine.py

      - name: Build Docker Image
        run: docker build -t smart-deployment-guard .

      - name: Run Docker Container Test
        run: |
          docker run -d -p 5000:5000 --name sdg-test smart-deployment-guard
          sleep 5
          curl http://localhost:5000/health
          docker stop sdg-test